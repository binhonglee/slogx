name: webpage_ui

on:
  push:
    branches:
      - main
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: ${{ hashFiles('**/package.json') }}-npm-v1
      
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24.x"

      - name: Use Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install npm
        run: npm ci

      - name: Install TypeScript SDK deps
        run: npm ci
        working-directory: ./sdk/ts

      - name: Install Python SDK deps (venv)
        run: |
          python -m venv .venv
          .venv/bin/pip install -r sdk/python/requirements.txt

      - name: Build docs
        run: npm run docs:build

      - name: Run Build
        run: npm run build

      - name: Test
        run: npm run test:coverage

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run E2E tests
        run: SLOGX_PYTHON="$GITHUB_WORKSPACE/.venv/bin/python" npm run test:e2e

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report-${{ matrix.node-version }}
          path: playwright-report/
          retention-days: 30

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: binhonglee/slogx
