name: python_sdk

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./sdk/python

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/sdk/python/requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: pytest -q

      - name: Build package
        run: |
          pip install build
          python -m build

      - name: Verify package contents
        run: |
          # Check that slogx.py is included in the wheel
          python << 'EOF'
          import glob
          import zipfile
          import sys

          wheels = glob.glob('dist/*.whl')
          if not wheels:
              print('ERROR: No wheel found in dist/')
              sys.exit(1)

          with zipfile.ZipFile(wheels[0]) as z:
              files = z.namelist()
              if 'slogx.py' not in files:
                  print('ERROR: slogx.py not found in wheel!')
                  print('Wheel contents:', files)
                  sys.exit(1)
              print('Package contents verified: slogx.py found')
          EOF

      - name: Test package install
        run: |
          pip install dist/*.whl
          python -c "import slogx; print('Import successful')"
